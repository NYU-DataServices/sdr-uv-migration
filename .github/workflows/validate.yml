name: 'Validate JSON Records'
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        pip install pipenv
        pipenv install
    - name: Validate JSON records
      run: |
        for file in records/combined/*.json; do
          python validate_json.py "$file"
        done
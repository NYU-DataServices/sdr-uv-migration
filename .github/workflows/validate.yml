name: 'Validate JSON Records'
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Get python version
      run: |
        python_version=$(cat .python-version)
        echo "python_version=${python_version}" >> $GITHUB_ENV
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ env.python_version }}
    - name: Install dependencies
      run: |
        pip install pipenv
        pipenv install
    - name: Validate JSON records
      run: |
        for file in records/combined/*.json; do
          pipenv run python lib/validate_json.py "$file"
        done